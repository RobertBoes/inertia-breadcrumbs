name: run-tests

on:
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: true
      matrix:
        os: [ubuntu-latest]
        php: [8.2, 8.3, 8.4]
        inertia: [^2.0, ^3.0@beta]
        laravel: [12.*, 13.*]
        stability: [prefer-lowest, prefer-stable]
        include:
          - laravel: 12.*
            testbench: ^10
            larastan: ^3
            phpunit-config: phpunit.xml.dist
          - laravel: 13.*
            testbench: ^11
            larastan: ^3
            phpunit-config: phpunit.xml.dist
        exclude:
          - laravel: 13.*
            php: 8.2

    name: PHP${{ matrix.php }} - L${{ matrix.laravel }} - Inertia ${{ matrix.inertia }} - ${{ matrix.stability }} - ${{ matrix.os }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v2

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: dom, curl, libxml, mbstring, zip, pcntl, pdo, sqlite, pdo_sqlite, bcmath, soap, intl, gd, exif, iconv, imagick, fileinfo
          coverage: none

      - name: Setup problem matchers
        run: |
          echo "::add-matcher::${{ runner.tool_cache }}/php.json"
          echo "::add-matcher::${{ runner.tool_cache }}/phpunit.json"

      - name: Install dependencies
        run: |
          composer require "laravel/framework:${{ matrix.laravel }}" "orchestra/testbench:${{ matrix.testbench }}" "larastan/larastan:${{ matrix.larastan }}" "inertiajs/inertia-laravel:${{ matrix.inertia }}" --no-interaction --no-update
          composer update --${{ matrix.stability }} --prefer-dist --no-interaction || (
            echo "Dependency resolution failed, removing incompatible packages..."
            composer remove diglactic/laravel-breadcrumbs tabuna/breadcrumbs glhd/gretel --dev --no-interaction --no-update 2>/dev/null || true
            composer update --${{ matrix.stability }} --prefer-dist --no-interaction
          )

      - name: Execute tests
        run: vendor/bin/phpunit --no-coverage --configuration ${{ matrix.phpunit-config }} --display-skipped --log-junit build/report.junit.xml

      - name: Report skipped tests
        if: always()
        env:
          MATRIX_LABEL: PHP${{ matrix.php }} - L${{ matrix.laravel }} - Inertia ${{ matrix.inertia }} - ${{ matrix.stability }}
        run: |
          if [ ! -f build/report.junit.xml ]; then exit 0; fi
          php -r '
            $xml = simplexml_load_file("build/report.junit.xml");
            if (!$xml) exit(0);
            $skipped = [];
            foreach ($xml->xpath("//testcase[skipped]") as $tc) {
              $skipped[] = [
                "test" => $tc["class"] . "::" . $tc["name"],
                "reason" => trim((string) $tc->skipped) ?: "No reason given",
              ];
            }
            $total = count($xml->xpath("//testcase"));
            $file = getenv("GITHUB_STEP_SUMMARY");
            $label = getenv("MATRIX_LABEL");
            if (count($skipped) > 0) {
              $md = "### ⚠️ $label — " . count($skipped) . " / $total tests skipped\n\n";
              $md .= "| Test | Reason |\n|------|--------|\n";
              foreach ($skipped as $s) {
                $md .= "| {$s["test"]} | {$s["reason"]} |\n";
              }
            } else {
              $md = "### ✅ $label — All $total tests ran\n";
            }
            file_put_contents($file, $md, FILE_APPEND);
          '
