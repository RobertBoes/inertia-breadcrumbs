name: run-tests

on:
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: true
      matrix:
        os: [ubuntu-latest]
        php: [8.2, 8.3, 8.4]
        inertia: [^2.0, ^3.0@beta]
        laravel: [12.*, 13.*]
        stability: [prefer-lowest, prefer-stable]
        include:
          - laravel: 12.*
            testbench: ^10
            larastan: ^3
            phpunit-config: phpunit.xml.dist
          - laravel: 13.*
            testbench: ^11
            larastan: ^3
            phpunit-config: phpunit.xml.dist
        exclude:
          - laravel: 13.*
            php: 8.2

    name: PHP${{ matrix.php }} - L${{ matrix.laravel }} - Inertia ${{ matrix.inertia }} - ${{ matrix.stability }} - ${{ matrix.os }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v2

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: dom, curl, libxml, mbstring, zip, pcntl, pdo, sqlite, pdo_sqlite, bcmath, soap, intl, gd, exif, iconv, imagick, fileinfo
          coverage: none

      - name: Setup problem matchers
        run: |
          echo "::add-matcher::${{ runner.tool_cache }}/php.json"
          echo "::add-matcher::${{ runner.tool_cache }}/phpunit.json"

      - name: Install dependencies
        run: |
          composer require "laravel/framework:${{ matrix.laravel }}" "orchestra/testbench:${{ matrix.testbench }}" "larastan/larastan:${{ matrix.larastan }}" "inertiajs/inertia-laravel:${{ matrix.inertia }}" --no-interaction --no-update
          composer update --${{ matrix.stability }} --prefer-dist --no-interaction

      - name: Execute tests
        id: tests
        run: |
          mkdir -p build
          vendor/bin/phpunit --no-coverage --configuration ${{ matrix.phpunit-config }} --display-skipped 2>&1 | tee build/test-output.txt
          exit ${PIPESTATUS[0]}

      - name: Report skipped tests
        if: always() && steps.tests.outcome != 'cancelled'
        env:
          MATRIX_LABEL: PHP${{ matrix.php }} - L${{ matrix.laravel }} - Inertia ${{ matrix.inertia }} - ${{ matrix.stability }}
        run: |
          if [ ! -f build/test-output.txt ]; then exit 0; fi
          php -r '
            $output = file_get_contents("build/test-output.txt");
            $label = getenv("MATRIX_LABEL");
            $file = getenv("GITHUB_STEP_SUMMARY");

            preg_match("/Tests: (\d+)/", $output, $totalMatch);
            preg_match("/Skipped: (\d+)/", $output, $skipMatch);
            $total = $totalMatch[1] ?? 0;
            $skipCount = $skipMatch[1] ?? 0;

            if ($skipCount == 0) {
              file_put_contents($file, "### ✅ $label — All $total tests ran\n", FILE_APPEND);
              exit(0);
            }

            $skipped = [];
            if (preg_match("/skipped tests?:\s*\n(.*?)(?=\nOK|FAILURES)/s", $output, $section)) {
              preg_match_all("/\d+\) (.+?)\n(.+?)(?=\n\n|\n\d+\)|\Z)/s", $section[1], $matches, PREG_SET_ORDER);
              foreach ($matches as $m) {
                $skipped[] = ["test" => trim($m[1]), "reason" => trim($m[2])];
              }
            }

            $md = "### ⚠️ $label — $skipCount / $total tests skipped\n\n";
            if (count($skipped) > 0) {
              $md .= "| Test | Reason |\n|------|--------|\n";
              foreach ($skipped as $s) {
                $md .= "| {$s["test"]} | {$s["reason"]} |\n";
              }
            }
            file_put_contents($file, $md, FILE_APPEND);
          '
